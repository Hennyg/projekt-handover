<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <title>Ny projekt handover</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/assets/app.css">
  <style>
    .teamButtons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .teamButton {
      min-height: 54px;
      font-size: 16px;
      border: 2px solid #d1d5db;
      background: #fff;
    }

    .teamButton.active {
      border-color: #a00018;
      background: #fff1f2;
      color: #a00018;
    }

    .requiredMark {
      color: #a00018;
      font-weight: 800;
    }

    .saveStatusTile {
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 14px;
      line-height: 1.4;
    }

    .saveStatusTile.ok {
      border-color: #bbf7d0;
      background: #f0fdf4;
      color: #15803d;
    }

    .saveStatusTile.error {
      border-color: #fecaca;
      background: #fef2f2;
      color: #991b1b;
      white-space: pre-wrap;
    }

    .saveProgressOuter {
      width: 100%;
      height: 10px;
      background: rgba(30, 64, 175, .14);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .saveProgressInner {
      height: 100%;
      width: 0%;
      background: currentColor;
      border-radius: 999px;
      transition: width .2s ease;
    }

    /* Adresse-knapper: horisontale pills */
    .addressButtons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .addressButton {
      min-height: 48px;
      font-size: 15px;
      border: 2px solid #d1d5db;
      background: #fff;
      border-radius: 10px;
      padding: 10px 16px;
      text-align: left;
      flex: 1 1 auto;
      min-width: 160px;
    }

    .addressButton.active {
      border-color: #a00018;
      background: #fff1f2;
      color: #a00018;
    }

    @media (max-width: 520px) {
      .teamButtons {
        grid-template-columns: 1fr;
      }

      .addressButton {
        width: 100%;
        flex: 1 1 100%;
      }
    }
  </style>
</head>
<body class="mobileBody">
  <header class="topbar mobileTopbar">
    <div class="topbar-left">
      <div class="logoText">PH</div>
      <div class="titleBlock">
        <div class="appTitle">Projekt handover</div>
        <div class="appSubTitle">Ny registrering</div>
      </div>
    </div>
    <div class="topbar-right">
      <a href="/">Liste</a>
    </div>
  </header>

  <main class="phoneWrap">
    <div id="status" class="status hidden"></div>

    <section id="customerTile" class="tile hidden">
      <h2>1. Kunde</h2>
      <input id="customerSearch" type="search" placeholder="Søg kundenavn eller kundenr.">
      <div id="customerResults" class="searchResults"></div>
      <div id="selectedCustomer" class="selectedBox hidden"></div>
    </section>

    <section id="addressTile" class="tile hidden">
      <h2 id="addressTitle">2. Vælg adresse</h2>
      <div id="addressButtons" class="addressButtons"></div>
    </section>

    <section id="teamTile" class="tile hidden">
      <h2 id="teamTitle">3. Vælg team</h2>
      <div class="teamButtons">
        <button id="btnTeamMilk" class="teamButton" type="button" data-team="Milk &amp; cooling">Milk &amp; cooling</button>
        <button id="btnTeamFeed" class="teamButton" type="button" data-team="Feed &amp; barn">Feed &amp; barn</button>
      </div>
    </section>

    <section id="productTile" class="tile hidden">
      <h2 id="productTitle">4. Produkt</h2>
      <select id="productSelect"></select>
      <input id="manualProduct" class="hidden" type="text" placeholder="Skriv produkt">
      <div id="productHelp" class="hint"></div>
      <button id="btnProductNext" type="button" class="primary wide hidden">Videre</button>
    </section>

    <section id="detailsTile" class="tile hidden">
      <h2 id="detailsTitle">5. Oplysninger</h2>

      <label for="ldn">LDN nummer <span class="requiredMark">*</span></label>
      <input id="ldn" type="text" autocomplete="off">

      <label for="comment">Kommentar</label>
      <textarea id="comment" rows="6"></textarea>

      <button id="btnDetailsNext" type="button" class="primary wide hidden">Videre</button>
    </section>

    <section id="imageTile" class="tile hidden">
      <h2 id="imageTitle">6. Billeder</h2>
      <div class="buttonRow">
        <button id="btnPick" type="button">Tilføj fra telefon</button>
        <button id="btnCamera" type="button">Tag billede</button>
      </div>
      <input id="fileAlbum" type="file" accept="image/*" multiple class="hidden">
      <input id="fileCamera" type="file" accept="image/*" capture="environment" class="hidden">
      <div id="imagePreview" class="imagePreview"></div>
    </section>

    <section id="saveTile" class="tile hidden">
      <div id="saveStatusTile" class="saveStatusTile hidden">
        <div id="saveStatusText"></div>
        <div class="saveProgressOuter">
          <div id="saveProgressInner" class="saveProgressInner"></div>
        </div>
      </div>
      <button id="btnSave" type="button" class="primary wide">Gem handover</button>
    </section>
  </main>

  <script src="/assets/handover.js?v=3"></script>
</body>
</html>
