<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <title>Projekt handover</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/assets/app.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <div class="logoText">PH</div>
      <div class="titleBlock">
        <div class="appTitle">Projekt handover</div>
        <div class="appSubTitle">Oversigt</div>
      </div>
    </div>
    <div class="topbar-right">
      <span id="userDisplay"></span>
      <button id="btnQr" type="button" class="navButton">QR</button>
      <a href="/handover.html">Ny handover</a>
      <a href="/.auth/logout?post_logout_redirect_uri=/">Log ud</a>
    </div>
  </header>

  <main class="pageWrap">
    <section class="toolbar">
      <input id="q" type="search" placeholder="Søg kunde, kundenr., produkt, LDN, tekniker...">
      <select id="statusFilter">
        <option value="active" selected>Aktive</option>
        <option value="done">Færdige</option>
        <option value="all">Alle</option>
      </select>
      <button id="btnReset" type="button">Nulstil</button>
      <div class="toolbarSpacer"></div>
      <span id="countText"></span>
      <button id="btnRefresh" type="button">Opdater</button>
    </section>

    <section class="tableWrap">
      <table class="dataTable">
        <thead>
          <tr>
            <th class="checkCol">Færdig</th>
            <th data-sort="createdon" class="sortable">Dato <span class="sortIcon">⇅</span></th>
            <th data-sort="lch_kundenummer" class="sortable">Kundenr. <span class="sortIcon">⇅</span></th>
            <th data-sort="lch_kundenavn" class="sortable">Kunde <span class="sortIcon">⇅</span></th>
            <th data-sort="lch_produkt" class="sortable">Produkt <span class="sortIcon">⇅</span></th>
            <th data-sort="lch_ldn" class="sortable">LDN <span class="sortIcon">⇅</span></th>
            <th data-sort="lch_tekniker" class="sortable">Tekniker <span class="sortIcon">⇅</span></th>
            <th class="num">Billeder</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </section>
  </main>

  <div id="detailBackdrop" class="detailBackdrop hidden"></div>
  <div id="detailDrawer" class="detailDrawer hidden">
    <button class="detailClose" id="detailClose">✕</button>
    <div id="detailContent"></div>
  </div>

  <div id="qrBackdrop" class="detailBackdrop hidden"></div>
  <div id="qrModal" class="qrModal hidden">
    <button class="detailClose" id="qrClose">✕</button>
    <h2>QR til handover</h2>
    <p>Scan med telefonen for at åbne tekniker-siden.</p>
    <div class="qrBox">
      <img id="qrImage" alt="QR kode til handover">
    </div>
    <input id="qrUrl" type="text" readonly>
  </div>

  <script src="/assets/index.js"></script>
</body>
</html>
